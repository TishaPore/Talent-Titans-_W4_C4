<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detection</title>
    <style>
        body{
            font-family: Arial;
            background-color:#f4f4f4;
            text-align:center;
            margin-top:100px;
        }

        .container{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:80%;
            padding:10px;
            margin-top:20px;
        }

        button{
            padding:10px 20px;
            background-color:blue;
            color:white;
            border:none;
            margin-top:20px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI-Based Phishing URL Detection</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL Here">
        <br>
        <button type="submit">Check URL</button>
    </form>

    {% if prediction %}
        <h2>{{ prediction }}</h2>
    {% endif %}
</div>

</body>
</html>
